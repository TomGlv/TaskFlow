<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow – Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-brand"><span class="logo-icon">✓</span> TaskFlow</div>
    <div class="nav-right">
      <span id="nav-username"></span>
      <button id="btn-logout" class="btn btn-outline btn-sm">Logout</button>
    </div>
  </nav>

  <!-- MAIN LAYOUT -->
  <div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h3>Filters</h3>
      <div class="filter-group">
        <label>Status</label>
        <select id="filter-status">
          <option value="">All</option>
          <option value="todo">To Do</option>
          <option value="in_progress">In Progress</option>
          <option value="done">Done</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Priority</label>
        <select id="filter-priority">
          <option value="">All</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Category</label>
        <select id="filter-category">
          <option value="">All</option>
        </select>
      </div>

      <hr />

      <h3>Categories</h3>
      <ul id="category-list" class="category-list"></ul>
      <div class="category-add">
        <input type="text" id="new-category" placeholder="New category…" />
        <button id="btn-add-category" class="btn btn-sm btn-primary">Add</button>
      </div>
    </aside>

    <!-- CONTENT -->
    <main class="content">
      <div class="content-header">
        <input type="text" id="search-input" class="search-box" placeholder="Search tasks…" />
        <button id="btn-new-task" class="btn btn-primary">+ New Task</button>
      </div>

      <div id="task-stats" class="task-stats"></div>

      <div id="task-list" class="task-list">
        <p class="empty-state">Loading tasks…</p>
      </div>
    </main>
  </div>

  <!-- TASK MODAL -->
  <div id="task-modal" class="modal hidden">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modal-title">New Task</h2>
        <button class="modal-close" id="btn-close-modal">&times;</button>
      </div>

      <form id="task-form">
        <input type="hidden" id="task-id" />
        <div class="form-group">
          <label>Title *</label>
          <input type="text" id="task-title" placeholder="Task title" required />
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="task-description" rows="3" placeholder="Optional description…"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Status</label>
            <select id="task-status">
              <option value="todo">To Do</option>
              <option value="in_progress">In Progress</option>
              <option value="done">Done</option>
            </select>
          </div>
          <div class="form-group">
            <label>Priority</label>
            <select id="task-priority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Due Date</label>
            <input type="date" id="task-due-date" />
          </div>
          <div class="form-group">
            <label>Category</label>
            <select id="task-category">
              <option value="">None</option>
            </select>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" id="btn-delete-task" class="btn btn-danger hidden">Delete</button>
          <div class="modal-actions-right">
            <button type="button" id="btn-cancel-modal" class="btn btn-outline">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Task</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
